<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — WorkBridge PH</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tokens.css">
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="card-body p-4">
        <a href="../index.html" class="auth-card-brand text-dark text-decoration-none fw-bold">
          <img src="../assets/img/logo.png" alt="" class="auth-card-logo">
          <span>WorkBridge PH</span>
        </a>
        <h1 class="h4 mb-4">Log in</h1>
        <form id="login-form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input" required placeholder="you@example.com">
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-input" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Log in</button>
        </form>
        <p class="mt-3 text-center text-secondary small">
          <a href="forgot.html">Forgot password?</a> · <a href="register.html">Create account</a>
        </p>
        <div class="auth-demo">
          <strong>Demo accounts</strong>
          <p>juan@example.com / password (seeker)</p>
          <p>hr@technova.ph / password (employer)</p>
          <p>admin@workbridge.ph / password (admin)</p>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script type="module" src="../assets/js/app.js"></script>
  <script type="module">
    import { login, getRedirectAfterLogin } from './../assets/js/auth.js';
    import { toastError, toastSuccess } from './../assets/js/ui.toast.js';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      btn.disabled = true;
      btn.textContent = 'Logging in…';
      const fd = new FormData(e.target);
      const result = await login(fd.get('email'), fd.get('password'));
      if (result.ok) {
        toastSuccess('Welcome back!');
        const redirect = new URLSearchParams(location.search).get('redirect');
        setTimeout(() => {
          window.location.href = redirect || getRedirectAfterLogin(result.user);
        }, 300);
      } else {
        toastError(result.error);
        btn.disabled = false;
        btn.textContent = 'Log in';
      }
    });
  </script>
</body>
</html>
